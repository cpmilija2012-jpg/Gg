<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Services | Red Bull Clan</title>
    <style>
        :root {
            --red-bull-blue: #000b49;
            --red-bull-red: #ed1c24;
            --red-bull-yellow: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(45deg, var(--red-bull-blue), #000);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--red-bull-red);
        }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        h2 { text-align: center; color: var(--red-bull-yellow); text-transform: uppercase; letter-spacing: 2px; margin-top: 40px; }

        .promo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .promo-card {
            background: linear-gradient(135deg, #1e1e1e, #111);
            border: 2px solid var(--red-bull-red);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .promo-badge { background: var(--red-bull-red); padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        .menu-box {
            background: var(--glass);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .menu-item:last-child { border: none; }
        .item-name { font-size: 17px; }
        .item-price { color: var(--red-bull-yellow); font-weight: bold; font-size: 18px; }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .contact-card {
            background: #111;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .contact-card:hover { border-color: var(--red-bull-yellow); background: #1a1a1a; }

        .clan-box {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--red-bull-blue);
            margin-top: 50px;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px;
            box-sizing: border-box;
        }

        .btn {
            background: var(--red-bull-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:hover { background: var(--red-bull-yellow); color: black; }

        footer { text-align: center; margin-top: 50px; padding: 20px; font-size: 13px; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">💎 CPM SERVICES</h1>
    <p style="color: var(--red-bull-yellow); font-weight: bold;">RED BULL CLAN OFFICIAL SHOP</p>
</header>

            <p style="font-size: 22px; color: var(--red-bull-yellow); font-weight: bold;">$3.50 <span style="text-decoration: line-through; color: #555; font-size: 16px;">$4.50</span></p>
        </div>
        <div class="promo-card">

        </div>
    </div>
